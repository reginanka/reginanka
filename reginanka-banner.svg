<svg width="860" height="380" viewBox="0 0 860 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="orb1" cx="15%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="85%" cy="80%" r="35%">
      <stop offset="0%" stop-color="#e879f9" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#e879f9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="90%" cy="25%" r="30%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nameGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#f0e6ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="underline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0"/>
      <stop offset="30%" stop-color="#a855f7"/>
      <stop offset="70%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#e879f9" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sideBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur8"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="blur4"><feGaussianBlur stdDeviation="4"/></filter>
    <clipPath id="bannerClip"><rect width="860" height="380" rx="16"/></clipPath>

    <!-- Typewriter clip rects — width animates 0→full→0 -->
    <clipPath id="ctw1"><rect id="cr1" x="392" y="210" width="0" height="26"/></clipPath>
    <clipPath id="ctw2"><rect id="cr2" x="392" y="210" width="0" height="26"/></clipPath>
    <clipPath id="ctw3"><rect id="cr3" x="392" y="210" width="0" height="26"/></clipPath>
    <clipPath id="ctw4"><rect id="cr4" x="392" y="210" width="0" height="26"/></clipPath>
    <clipPath id="ctw5"><rect id="cr5" x="392" y="210" width="0" height="26"/></clipPath>
  </defs>

  <style>
    .tw { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 13px; fill: #e879f9; }

    /*
      Cycle = 25s, 5 lines x 5s each
      Per line: 1.8s type  +  2s hold  +  1.2s erase = 5s
      Pixel widths (≈8px/ch at 13px mono):
        L1 "Building AI Agents + RAG Systems" 36ch -> 288px
        L2 "⚙️  n8n · Make.com · Power User"    31ch - 248px
        L3 "🐍 Python + Aiogram + FastAPI"       30ch - 240px
        L4 "🧠 LangChain · OpenAI · Gemini"      30ch - 240px
        L5 "100+ bots · Automate to Scale"     31ch -> 248px
    */

    /* Line 1: 0s–5s */
    #cr1 { animation: tw1 25s steps(36, end) infinite; }
    @keyframes tw1 {
      0%    { width:   0; }   /* start typing */
      7.2%  { width: 288px; } /* done typing  1.8s/25s */
      15.2% { width: 288px; } /* hold end     2.0s hold */
      20%   { width:   0; }   /* erased       1.2s erase */
      100%  { width:   0; }
    }

    /* Line 2: 5s–10s */
    #cr2 { animation: tw2 25s steps(31, end) infinite; }
    @keyframes tw2 {
      0%    { width:   0; }
      20%   { width:   0; }
      27.2% { width: 248px; }
      35.2% { width: 248px; }
      40%   { width:   0; }
      100%  { width:   0; }
    }

    /* Line 3: 10s–15s */
    #cr3 { animation: tw3 25s steps(30, end) infinite; }
    @keyframes tw3 {
      0%    { width:   0; }
      40%   { width:   0; }
      47.2% { width: 240px; }
      55.2% { width: 240px; }
      60%   { width:   0; }
      100%  { width:   0; }
    }

    /* Line 4: 15s–20s */
    #cr4 { animation: tw4 25s steps(30, end) infinite; }
    @keyframes tw4 {
      0%    { width:   0; }
      60%   { width:   0; }
      67.2% { width: 240px; }
      75.2% { width: 240px; }
      80%   { width:   0; }
      100%  { width:   0; }
    }

    /* Line 5: 20s–25s */
    #cr5 { animation: tw5 25s steps(31, end) infinite; }
    @keyframes tw5 {
      0%    { width:   0; }
      80%   { width:   0; }
      87.2% { width: 248px; }
      95.2% { width: 248px; }
      100%  { width:   0; }
    }

    /* Cursor: same timing as clips, translateX mirrors clip right edge */
    #tw-cursor {
      animation:
        cursorX  25s linear infinite,
        cursorBlink 0.7s step-end infinite;
    }
    @keyframes cursorBlink {
      0%,49% { opacity: 1; }
      50%,100%{ opacity: 0; }
    }
    @keyframes cursorX {
      0%    { transform: translateX(392px); }
      7.2%  { transform: translateX(680px); }
      15.2% { transform: translateX(680px); }
      20%   { transform: translateX(392px); }
      27.2% { transform: translateX(640px); }
      35.2% { transform: translateX(640px); }
      40%   { transform: translateX(392px); }
      47.2% { transform: translateX(632px); }
      55.2% { transform: translateX(632px); }
      60%   { transform: translateX(392px); }
      67.2% { transform: translateX(632px); }
      75.2% { transform: translateX(632px); }
      80%   { transform: translateX(392px); }
      87.2% { transform: translateX(640px); }
      95.2% { transform: translateX(640px); }
      100%  { transform: translateX(392px); }
    }
  </style>

  <g clip-path="url(#bannerClip)">
    <!-- BG -->
    <rect width="860" height="380" fill="#080b10"/>

    <!-- Grid -->
    <g stroke="#a855f7" stroke-opacity="0.07" stroke-width="1">
      <line x1="0" y1="40"  x2="860" y2="40"/>  <line x1="0" y1="80"  x2="860" y2="80"/>
      <line x1="0" y1="120" x2="860" y2="120"/> <line x1="0" y1="160" x2="860" y2="160"/>
      <line x1="0" y1="200" x2="860" y2="200"/> <line x1="0" y1="240" x2="860" y2="240"/>
      <line x1="0" y1="280" x2="860" y2="280"/> <line x1="0" y1="320" x2="860" y2="320"/>
      <line x1="40"  y1="0" x2="40"  y2="380"/> <line x1="80"  y1="0" x2="80"  y2="380"/>
      <line x1="120" y1="0" x2="120" y2="380"/> <line x1="160" y1="0" x2="160" y2="380"/>
      <line x1="200" y1="0" x2="200" y2="380"/> <line x1="240" y1="0" x2="240" y2="380"/>
      <line x1="280" y1="0" x2="280" y2="380"/> <line x1="320" y1="0" x2="320" y2="380"/>
      <line x1="360" y1="0" x2="360" y2="380"/> <line x1="400" y1="0" x2="400" y2="380"/>
      <line x1="440" y1="0" x2="440" y2="380"/> <line x1="480" y1="0" x2="480" y2="380"/>
      <line x1="520" y1="0" x2="520" y2="380"/> <line x1="560" y1="0" x2="560" y2="380"/>
      <line x1="600" y1="0" x2="600" y2="380"/> <line x1="640" y1="0" x2="640" y2="380"/>
      <line x1="680" y1="0" x2="680" y2="380"/> <line x1="720" y1="0" x2="720" y2="380"/>
      <line x1="760" y1="0" x2="760" y2="380"/> <line x1="800" y1="0" x2="800" y2="380"/>
      <line x1="840" y1="0" x2="840" y2="380"/>
    </g>

    <!-- Orbs -->
    <rect width="860" height="380" fill="url(#orb1)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="7s" repeatCount="indefinite"/>
    </rect>
    <rect width="860" height="380" fill="url(#orb2)">
      <animate attributeName="opacity" values="1;0.6;1" dur="9s" repeatCount="indefinite"/>
    </rect>
    <rect width="860" height="380" fill="url(#orb3)">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="6s" repeatCount="indefinite"/>
    </rect>

    <!-- Particles -->
    <circle r="2.5" cx="80"  fill="#a855f7" opacity="0">
      <animate attributeName="cy" values="380;0" dur="6s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="6s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle r="2" cx="200" fill="#a855f7" opacity="0">
      <animate attributeName="cy" values="380;0" dur="8s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="8s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" cx="300" fill="#e879f9" opacity="0">
      <animate attributeName="cy" values="380;0" dur="7s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="7s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle r="2" cx="430" fill="#e879f9" opacity="0">
      <animate attributeName="cy" values="380;0" dur="5s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="5s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.5" cx="560" fill="#a855f7" opacity="0">
      <animate attributeName="cy" values="380;0" dur="9s" begin="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="9s" begin="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="2" cx="660" fill="#6366f1" opacity="0">
      <animate attributeName="cy" values="380;0" dur="6.5s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="6.5s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" cx="760" fill="#a855f7" opacity="0">
      <animate attributeName="cy" values="380;0" dur="7.5s" begin="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="7.5s" begin="4s" repeatCount="indefinite"/>
    </circle>
    <circle r="2" cx="140" fill="#c084fc" opacity="0">
      <animate attributeName="cy" values="380;0" dur="10s" begin="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0" dur="10s" begin="3.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Corner brackets -->
    <g stroke-width="2" fill="none">
      <polyline points="16,36 16,16 36,16">
        <animate attributeName="stroke" values="#a855f766;#e879f9ee;#a855f766" dur="3s" repeatCount="indefinite"/>
      </polyline>
      <polyline points="824,16 844,16 844,36">
        <animate attributeName="stroke" values="#a855f766;#e879f9ee;#a855f766" dur="3s" begin="0.75s" repeatCount="indefinite"/>
      </polyline>
      <polyline points="16,344 16,364 36,364">
        <animate attributeName="stroke" values="#a855f766;#e879f9ee;#a855f766" dur="3s" begin="1.5s" repeatCount="indefinite"/>
      </polyline>
      <polyline points="824,364 844,364 844,344">
        <animate attributeName="stroke" values="#a855f766;#e879f9ee;#a855f766" dur="3s" begin="2.25s" repeatCount="indefinite"/>
      </polyline>
    </g>

    <!-- Side bars -->
    <rect x="32" y="150" width="3" height="80" rx="2" fill="url(#sideBar)" opacity="0.8"/>
    <rect x="825" y="150" width="3" height="80" rx="2" fill="url(#sideBar)" opacity="0.8"/>

    <!-- Status badge -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.3s" fill="freeze"/>
      <rect x="310" y="62" width="240" height="24" rx="12" fill="#a855f71a" stroke="#a855f74d" stroke-width="1"/>
      <circle cx="336" cy="74" r="4" fill="#4ade80" filter="url(#blur4)"/>
      <circle cx="336" cy="74" r="3" fill="#4ade80">
        <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <text x="358" y="78" font-family="JetBrains Mono, monospace" font-size="10" fill="#e879f9cc" letter-spacing="1.5">AVAILABLE FOR PROJECTS</text>
    </g>

    <!-- Name -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.7s" begin="0.6s" fill="freeze"/>
      <text x="430" y="158" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="56" font-weight="800" fill="#a855f7" filter="url(#blur8)" opacity="0.5">Rehina Nanaka</text>
      <text x="430" y="158" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="56" font-weight="800" fill="url(#nameGlow)">Rehina Nanaka</text>
    </g>
    <rect x="230" y="166" width="400" height="2" rx="1" fill="url(#underline)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.3s" fill="freeze"/>
    </rect>

    <!-- Role -->
    <text x="430" y="196" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#a855f7" letter-spacing="3" opacity="0">
      AI AUTOMATION ENGINEER
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.9s" fill="freeze"/>
    </text>

    <!-- ── Typewriter block ── -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.2s" fill="freeze"/>

      <!-- Prompt -->
      <text x="358" y="228" font-family="JetBrains Mono, monospace" font-size="13" fill="#a855f77f">&gt;_</text>

      <!-- 5 lines, each clipped by its own animating rect -->
      <text clip-path="url(#ctw1)" class="tw" x="392" y="228">🤖 Building AI Agents &amp; RAG Systems</text>
      <text clip-path="url(#ctw2)" class="tw" x="392" y="228">⚙️  n8n · Make.com · Power User</text>
      <text clip-path="url(#ctw3)" class="tw" x="392" y="228">🐍 Python + Aiogram + FastAPI</text>
      <text clip-path="url(#ctw4)" class="tw" x="392" y="228">🧠 LangChain · OpenAI · Gemini</text>
      <text clip-path="url(#ctw5)" class="tw" x="392" y="228">🚀 100+ bots · Automate -&gt; Scale</text>

      <!-- Cursor: positioned at x=0, moved by CSS translateX -->
      <rect id="tw-cursor" x="0" y="215" width="2" height="15" rx="1" fill="#e879f9"/>
    </g>

    <!-- Skill chips row 1 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.7s" begin="1.6s" fill="freeze"/>
      <rect x="164" y="252" width="68" height="22" rx="5" fill="#a855f714" stroke="#a855f733" stroke-width="1"/>
      <text x="198" y="267" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#ffffff99">Python</text>
      <rect x="240" y="252" width="44" height="22" rx="5" fill="#a855f714" stroke="#a855f733" stroke-width="1"/>
      <text x="262" y="267" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#ffffff99">n8n</text>
      <rect x="292" y="252" width="80" height="22" rx="5" fill="#a855f714" stroke="#a855f733" stroke-width="1"/>
      <text x="332" y="267" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#ffffff99">Make.com</text>
      <rect x="380" y="252" width="82" height="22" rx="5" fill="#a855f714" stroke="#a855f733" stroke-width="1"/>
      <text x="421" y="267" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#ffffff99">LangChain</text>
      <rect x="470" y="252" width="72" height="22" rx="5" fill="#a855f714" stroke="#a855f733" stroke-width="1"/>
      <text x="506" y="267" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#ffffff99">Aiogram</text>
      <rect x="550" y="252" width="66" height="22" rx="5" fill="#a855f714" stroke="#a855f733" stroke-width="1"/>
      <text x="583" y="267" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#ffffff99">FastAPI</text>
      <rect x="624" y="252" width="72" height="22" rx="5" fill="#a855f714" stroke="#a855f733" stroke-width="1"/>
      <text x="660" y="267" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#ffffff99">Docker</text>
    </g>

    <!-- Skill chips row 2 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.7s" begin="1.8s" fill="freeze"/>
      <rect x="228" y="282" width="88" height="22" rx="5" fill="#a855f714" stroke="#a855f733" stroke-width="1"/>
      <text x="272" y="297" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#ffffff99">RAG Systems</text>
      <rect x="324" y="282" width="82" height="22" rx="5" fill="#a855f714" stroke="#a855f733" stroke-width="1"/>
      <text x="365" y="297" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#ffffff99">AI Agents</text>
      <rect x="414" y="282" width="84" height="22" rx="5" fill="#a855f714" stroke="#a855f733" stroke-width="1"/>
      <text x="456" y="297" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#ffffff99">PostgreSQL</text>
      <rect x="506" y="282" width="72" height="22" rx="5" fill="#a855f714" stroke="#a855f733" stroke-width="1"/>
      <text x="542" y="297" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#ffffff99">BigQuery</text>
      <rect x="586" y="282" width="48" height="22" rx="5" fill="#a855f714" stroke="#a855f733" stroke-width="1"/>
      <text x="610" y="297" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#ffffff99">GCP</text>
    </g>

    <!-- Bottom code line -->
    <text x="430" y="352" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#a855f7" letter-spacing="1" opacity="0">
      automate.today() -&gt; scale.tomorrow()
      <animate attributeName="opacity" values="0;0.8" dur="0.5s" begin="2s" fill="freeze"/>
    </text>

  </g>
</svg>
